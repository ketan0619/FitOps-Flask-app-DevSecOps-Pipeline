<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitOps AI</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            /* Vibrant Side Gradients */
            background: 
                radial-gradient(circle at -10% 50%, rgba(255, 75, 138, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 110% 50%, rgba(79, 172, 254, 0.2) 0%, transparent 50%),
                linear-gradient(135deg, #0f0c29, #24243e, #050505);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            padding: 30px;
            border-radius: 24px;
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .logo { width: 60px; margin-bottom: 5px; filter: drop-shadow(0 0 10px #4facfe); }
        h1 { color: white; font-size: 26px; letter-spacing: -0.5px; }
        .subtitle { color: #888; font-size: 10px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        .input-group { display: flex; flex-direction: column; gap: 12px; }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: #4facfe; background: rgba(0,0,0,0.5); }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #ff4b8a, #4facfe);
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* The Result Section (Hidden by Default) */
        #resultSection {
            display: none; /* This hides the raw text completely */
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.5s ease;
        }

        .bmi-card {
            background: rgba(79, 172, 254, 0.1);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(79, 172, 254, 0.3);
            margin-bottom: 12px;
        }
        .bmi-card h2 { color: #4facfe; font-size: 24px; }
        .bmi-card p { color: white; font-size: 12px; opacity: 0.8; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            text-align: left;
        }
        .stat-item label { color: #ff4b8a; font-size: 9px; font-weight: 600; text-transform: uppercase; }
        .stat-item p { color: #ddd; font-size: 12px; margin-top: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <img src="static/logo.png" class="logo" alt="Logo">
    <h1>FitOps AI</h1>
    <p class="subtitle">Next-Gen Fitness</p>

    <div class="input-group">
        <input type="number" id="age" placeholder="Age">
        <input type="number" id="height" placeholder="Height (cm)">
        <input type="number" id="weight" placeholder="Weight (kg)">
        <button onclick="calculateBMI()">Analyze Now</button>
    </div>

    <!-- This section is now controlled by Javascript, so no raw code shows -->
    <div id="resultSection">
        <div class="bmi-card">
            <h2 id="bmiValue">24.5</h2>
            <p id="bmiCategory">Normal Weight</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-item">
                <label>Daily Steps</label>
                <p id="stepGoal">8,000</p>
            </div>
            <div class="stat-item">
                <label>Workout</label>
                <p id="workoutType">Cardio</p>
            </div>
            <div class="stat-item" style="grid-column: span 2;">
                <label>Diet Tip</label>
                <p id="dietTip">Focus on high protein and leafy greens.</p>
            </div>
        </div>
    </div>
</div>

<script>
    function calculateBMI() {
        const h = document.getElementById('height').value / 100;
        const w = document.getElementById('weight').value;
        
        if(h > 0 && w > 0) {
            const bmi = (w / (h * h)).toFixed(1);
            document.getElementById('bmiValue').innerText = bmi;
            
            let category = "";
            if(bmi < 18.5) category = "Underweight";
            else if(bmi < 25) category = "Normal Weight";
            else category = "Overweight";
            
            document.getElementById('bmiCategory').innerText = category;
            document.getElementById('resultSection').style.display = 'block';
        } else {
            alert("Please enter valid height and weight");
        }
    }
</script>

</body>
</html>
