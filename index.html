<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitOps AI</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            /* Deep Space Gradient with Side Glows */
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 75, 138, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(79, 172, 254, 0.15) 0%, transparent 40%),
                linear-gradient(135deg, #0f0c29, #24243e, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 35px;
            border-radius: 30px;
            width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .logo { width: 70px; margin-bottom: 5px; filter: drop-shadow(0 0 8px #4facfe); }
        h1 { color: white; font-size: 30px; font-weight: 600; letter-spacing: -1px; }
        .subtitle { color: #888; font-size: 12px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }

        form { display: grid; gap: 15px; }
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus { background: rgba(0, 0, 0, 0.4); outline: none; border-color: #4facfe; box-shadow: 0 0 15px rgba(79, 172, 254, 0.2); }

        button {
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(90deg, #ff4b8a, #4facfe);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 10px 25px rgba(255, 75, 138, 0.3); }

        /* Stylish Result Section - Fix for showing raw code */
        .result {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s ease;
        }

        /* If result is not provided by Flask, this hides the raw {{ }} tags */
        {% if not result %}
        .result { display: none; }
        {% endif %}

        .bmi-card {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.1), rgba(255, 75, 138, 0.1));
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .bmi-card h2 { color: #4facfe; font-size: 26px; }
        .bmi-card span { color: #ff4b8a; font-size: 12px; font-weight: 600; text-transform: uppercase; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            text-align: left;
        }
        .stat-box label { color: #666; font-size: 10px; font-weight: 600; text-transform: uppercase; display: block; }
        .stat-box p { color: #eee; font-size: 13px; margin-top: 4px; }
        .full { grid-column: span 2; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="/static/logo.png" class="logo" alt="FitOps Logo">
    <h1>FitOps AI</h1>
    <p class="subtitle">Next-Gen Fitness</p>

    <form method="POST">
        <input type="number" name="age" placeholder="Age" required>
        <input type="number" name="height" placeholder="Height (cm)" required>
        <input type="number" name="weight" placeholder="Weight (kg)" required>
        <button type="submit">Analyze Now</button>
    </form>

    {% if result %}
    <div class="result">
        <div class="bmi-card">
            <span>Your Health Score</span>
            <h2>{{result.bmi}}</h2>
            <p style="color:white; font-size: 14px; opacity: 0.8;">{{result.category}}</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-box">
                <label>Daily Goal</label>
                <p>{{result.steps}} Steps</p>
            </div>
            <div class="stat-box">
                <label>Training</label>
                <p>{{result.workout}}</p>
            </div>
            <div class="stat-box full">
                <label>Nutrition Strategy</label>
                <p>{{result.diet}}</p>
            </div>
        </div>
    </div>
    {% endif %}
</div>

</body>
</html>
