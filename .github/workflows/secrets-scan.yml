name: Secrets Scan

on:
    workflow_call:

jobs:
    secrets-scan:
            runs_on: ubuntu-latest

            steps:
               - name: Checkout Code
                 uses: actions/checkout@v4
                 with: 
                    fetch-depth: 0

               - name: Run Gitleaks Scanner
                 uses: gitleaks/gitleaks-action@v2
                 env:
                   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
